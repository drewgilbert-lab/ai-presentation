name: Sync decks from Google Drive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Sync decks from Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          SYNC_PRUNE: ${{ vars.SYNC_PRUNE || 'false' }}
        run: node scripts/sync-decks-from-drive.js

      - name: Commit changes
        run: |
          git config user.name "deck-sync-bot"
          git config user.email "deck-sync-bot@users.noreply.github.com"
          git add decks/
          if git diff --staged --quiet; then
            echo "No deck changes"
            exit 0
          fi
          git commit -m "Sync decks from Google Drive"
          git push
